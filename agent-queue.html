<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agent Queue | JetEx</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e4ea;
    --muted: #7a7f8e;
    --accent: #6c8cff;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --orange: #fb923c;
    --purple: #a78bfa;
    --cyan: #60d5fa;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 20px;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .header-left { display: flex; flex-direction: column; gap: 12px; }
  .top-nav { display: flex; gap: 8px; flex-wrap: wrap; }
  .top-nav a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    background: var(--card);
    transition: all 0.2s;
  }
  .top-nav a:hover { color: var(--text); border-color: #3a3d4a; }
  .top-nav a.active { color: #fff; background: var(--accent); border-color: var(--accent); }
  .header-right { text-align: right; color: var(--muted); font-size: 12px; }
  #clock .time { color: var(--text); font-size: 20px; font-weight: 500; margin-bottom: 2px; }

  .toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
    margin-bottom: 18px;
  }
  .filters {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  select, button, input {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12px;
    outline: none;
  }
  button {
    cursor: pointer;
    font-weight: 700;
  }
  button:hover { border-color: var(--accent); color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.danger:hover { border-color: var(--red); color: var(--red); }
  #sync-status { color: var(--muted); font-size: 12px; }

  .queue {
    display: grid;
    grid-template-columns: repeat(6, minmax(220px, 1fr));
    gap: 14px;
    align-items: start;
    overflow-x: auto;
    padding-bottom: 6px;
  }
  .lane {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
    min-height: 180px;
  }
  .lane h2 {
    display: flex;
    align-items: center;
    gap: 8px;
    color: var(--muted);
    font-size: 12px;
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
  .ready .dot { background: var(--cyan); }
  .running .dot { background: var(--yellow); }
  .review .dot { background: var(--purple); }
  .blocked .dot { background: var(--red); }
  .merged .dot { background: var(--green); }
  .archived .dot { background: var(--muted); }
  .count {
    margin-left: auto;
    background: var(--bg);
    border-radius: 999px;
    padding: 2px 8px;
    color: var(--text);
  }
  .task {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 9px;
  }
  .task-title {
    font-size: 13px;
    line-height: 1.4;
    margin-bottom: 10px;
  }
  .meta {
    display: grid;
    gap: 6px;
    color: var(--muted);
    font-size: 11px;
    margin-bottom: 10px;
  }
  .meta b { color: var(--text); font-weight: 600; }
  .meta a { color: var(--cyan); text-decoration: none; word-break: break-all; }
  .meta a:hover { text-decoration: underline; }
  .criteria {
    color: var(--text);
    background: rgba(108, 140, 255, 0.08);
    border: 1px solid rgba(108, 140, 255, 0.18);
    border-radius: 6px;
    padding: 8px;
    font-size: 12px;
    line-height: 1.45;
    margin-bottom: 10px;
    white-space: pre-wrap;
  }
  .actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .actions button {
    padding: 6px 8px;
    font-size: 11px;
  }
  .empty {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 28px 0;
    font-style: italic;
  }
  .toast-wrap {
    position: fixed;
    right: 24px;
    bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 9999;
    pointer-events: none;
  }
  .toast {
    min-width: 240px;
    max-width: 320px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(26, 29, 39, 0.96);
    color: var(--text);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    font-size: 13px;
    transform: translateY(10px);
    opacity: 0;
    animation: toast-in 0.18s ease-out forwards;
  }
  .toast.success { border-color: rgba(74, 222, 128, 0.35); }
  .toast.error { border-color: rgba(248, 113, 113, 0.35); }
  @keyframes toast-in { to { transform: translateY(0); opacity: 1; } }
  @media (max-width: 1000px) {
    .queue { grid-template-columns: 1fr; overflow-x: visible; }
    header { flex-direction: column; }
    .header-right { text-align: left; }
  }
</style>
</head>
<body>
<header>
  <div class="header-left">
    <h1><span>JetEx</span> Agent Queue</h1>
    <nav class="top-nav">
      <a href="./index.html">Task Board</a>
      <a class="active" href="./agent-queue.html">Agent Queue</a>
      <a href="./projects.html">Projects</a>
      <a href="./plan.html">30/60/90 Plan</a>
      <a href="./ai-plan.html">AI Rollout Plan</a>
      <a href="./mariah.html">Mariah Calls</a>
      <a href="./api-endpoints.html">API Endpoints</a>
    </nav>
  </div>
  <div class="header-right">
    <div id="clock"></div>
    <div id="sync-status"></div>
  </div>
</header>

<div class="toolbar">
  <div class="filters">
    <select id="repoFilter">
      <option value="">All repos</option>
      <option value="lauren-ship-it-barnhart/jetex-task-board">jetex-task-board</option>
    </select>
    <select id="sourceFilter">
      <option value="">All sources</option>
      <option value="manual">Manual</option>
      <option value="claude-code">Claude Code</option>
      <option value="codex">Codex</option>
    </select>
    <button onclick="poll()">Refresh</button>
  </div>
  <button class="danger" onclick="batchArchiveGenerated()">Archive generated cleanup</button>
</div>

<div class="queue">
  <section class="lane ready" data-status="ready_for_agent">
    <h2><span class="dot"></span>Ready for Agent<span class="count" id="count-ready_for_agent">0</span></h2>
    <div id="lane-ready_for_agent"></div>
  </section>
  <section class="lane running" data-status="agent_running">
    <h2><span class="dot"></span>Running<span class="count" id="count-agent_running">0</span></h2>
    <div id="lane-agent_running"></div>
  </section>
  <section class="lane review" data-status="human_review">
    <h2><span class="dot"></span>Human Review<span class="count" id="count-human_review">0</span></h2>
    <div id="lane-human_review"></div>
  </section>
  <section class="lane blocked" data-status="blocked">
    <h2><span class="dot"></span>Blocked<span class="count" id="count-blocked">0</span></h2>
    <div id="lane-blocked"></div>
  </section>
  <section class="lane merged" data-status="merged">
    <h2><span class="dot"></span>Merged<span class="count" id="count-merged">0</span></h2>
    <div id="lane-merged"></div>
  </section>
  <section class="lane archived" data-status="archived">
    <h2><span class="dot"></span>Archived<span class="count" id="count-archived">0</span></h2>
    <div id="lane-archived"></div>
  </section>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
const API_URL = 'https://task-board-api-733342202720.us-east1.run.app';
const POLL_INTERVAL = 8000;
const STATUSES = ['ready_for_agent', 'agent_running', 'human_review', 'blocked', 'merged', 'archived'];
let tasks = [];

function escHtml(value) {
  const d = document.createElement('div');
  d.textContent = value == null ? '' : String(value);
  return d.innerHTML;
}

function showToast(message, kind = 'success') {
  const wrap = document.getElementById('toast-wrap');
  const el = document.createElement('div');
  el.className = `toast ${kind}`;
  el.textContent = message;
  wrap.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(10px)';
    setTimeout(() => el.remove(), 180);
  }, 2600);
}

function normalizeTask(task) {
  return {
    id: String(task.id || ''),
    text: task.text || '',
    status: task.status || 'ready_for_agent',
    source: task.source || 'manual',
    repo: task.repo || '',
    acceptance_criteria: task.acceptance_criteria || '',
    agent_type: task.agent_type || '',
    agent_run_id: task.agent_run_id || '',
    branch: task.branch || '',
    pr_url: task.pr_url || '',
    last_agent_update: task.last_agent_update || '',
    review_owner: task.review_owner || '',
  };
}

function buildQuery() {
  const params = new URLSearchParams();
  params.set('status', STATUSES.join(','));
  params.set('include_archived', '1');
  const repo = document.getElementById('repoFilter').value;
  const source = document.getElementById('sourceFilter').value;
  if (repo) params.set('repo', repo);
  if (source) params.set('source', source);
  params.set('_t', Date.now().toString());
  return params.toString();
}

async function fetchTasks() {
  const res = await fetch(`${API_URL}/api/tasks?${buildQuery()}`);
  if (!res.ok) throw new Error('Task fetch failed');
  const data = await res.json();
  if (data.success === false) throw new Error(data.error || 'Task fetch failed');
  tasks = (data.tasks || []).map(normalizeTask);
}

function renderTask(task) {
  const pr = task.pr_url
    ? `<div><b>PR</b> <a href="${escHtml(task.pr_url)}" target="_blank" rel="noopener">${escHtml(task.pr_url)}</a></div>`
    : '';
  const criteria = task.acceptance_criteria
    ? `<div class="criteria">${escHtml(task.acceptance_criteria)}</div>`
    : '';
  return `
    <article class="task">
      <div class="task-title">${escHtml(task.text)}</div>
      ${criteria}
      <div class="meta">
        <div><b>Repo</b> ${escHtml(task.repo || 'unassigned')}</div>
        <div><b>Branch</b> ${escHtml(task.branch || 'not created')}</div>
        ${pr}
        <div><b>Run</b> ${escHtml(task.agent_run_id || 'not started')}</div>
        <div><b>Owner</b> ${escHtml(task.review_owner || 'unassigned')}</div>
        <div><b>Update</b> ${escHtml(task.last_agent_update || 'No update yet')}</div>
      </div>
      <div class="actions">
        ${task.status !== 'agent_running' ? `<button onclick="updateStatus('${escHtml(task.id)}', 'agent_running')">Running</button>` : ''}
        ${task.status !== 'human_review' ? `<button onclick="updateStatus('${escHtml(task.id)}', 'human_review')">Review</button>` : ''}
        ${task.status !== 'blocked' ? `<button onclick="updateStatus('${escHtml(task.id)}', 'blocked')">Blocked</button>` : ''}
        ${task.status !== 'merged' ? `<button onclick="updateStatus('${escHtml(task.id)}', 'merged')">Merged</button>` : ''}
        ${task.status !== 'archived' ? `<button class="danger" onclick="archiveTask('${escHtml(task.id)}')">Archive</button>` : `<button onclick="updateStatus('${escHtml(task.id)}', 'open')">Reopen</button>`}
      </div>
    </article>`;
}

function render() {
  for (const status of STATUSES) {
    const laneTasks = tasks.filter(task => task.status === status);
    document.getElementById(`count-${status}`).textContent = laneTasks.length;
    document.getElementById(`lane-${status}`).innerHTML = laneTasks.length
      ? laneTasks.map(renderTask).join('')
      : '<div class="empty">No tasks</div>';
  }
}

async function updateStatus(id, status) {
  try {
    const res = await fetch(`${API_URL}/api/tasks/${encodeURIComponent(id)}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        status,
        last_agent_update: `Marked ${status.replace(/_/g, ' ')}`,
      }),
    });
    const data = await res.json();
    if (!res.ok || data.success === false) throw new Error(data.error || 'Update failed');
    showToast('Task updated');
    poll();
  } catch (e) {
    console.error(e);
    showToast('Task update failed', 'error');
  }
}

async function archiveTask(id) {
  try {
    const res = await fetch(`${API_URL}/api/tasks/${encodeURIComponent(id)}/archive`, { method: 'POST' });
    const data = await res.json();
    if (!res.ok || data.success === false) throw new Error(data.error || 'Archive failed');
    showToast('Task archived');
    poll();
  } catch (e) {
    console.error(e);
    showToast('Archive failed', 'error');
  }
}

async function batchArchiveGenerated() {
  if (!confirm('Archive generated claude-code tasks that are not done?')) return;
  try {
    const res = await fetch(`${API_URL}/api/tasks/batch-archive`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ source: 'claude-code', 'status!=': 'done' }),
    });
    const data = await res.json();
    if (!res.ok || data.success === false) throw new Error(data.error || 'Batch archive failed');
    showToast(`Archived ${data.count} generated tasks`);
    poll();
  } catch (e) {
    console.error(e);
    showToast('Batch archive failed', 'error');
  }
}

async function poll() {
  try {
    await fetchTasks();
    render();
    document.getElementById('sync-status').textContent = 'Synced';
  } catch (e) {
    console.error(e);
    document.getElementById('sync-status').textContent = 'API unavailable';
  }
}

function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const date = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('clock').innerHTML = `<div class="time">${time}</div>${date}`;
}

document.getElementById('repoFilter').addEventListener('change', poll);
document.getElementById('sourceFilter').addEventListener('change', poll);
updateClock();
poll();
setInterval(poll, POLL_INTERVAL);
setInterval(updateClock, 30000);
</script>
</body>
</html>
