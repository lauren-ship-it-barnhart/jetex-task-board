<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lauren's Task Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e4ea;
    --muted: #7a7f8e;
    --accent: #6c8cff;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --orange: #fb923c;
    --purple: #a78bfa;
    --cyan: #60d5fa;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  header h1 span { color: var(--accent); }
  .header-left {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .top-nav {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .top-nav a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    color: var(--muted);
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.3px;
    background: var(--card);
    transition: all 0.2s;
  }
  .top-nav a:hover {
    color: var(--text);
    border-color: #3a3d4a;
  }
  .top-nav a.active {
    color: #fff;
    background: var(--accent);
    border-color: var(--accent);
  }
  .header-right { text-align: right; }
  #clock {
    font-size: 14px;
    color: var(--muted);
    line-height: 1.5;
  }
  #clock .time { font-size: 20px; color: var(--text); font-weight: 500; }
  #sessions-bar {
    margin-top: 6px;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .session-badge {
    font-size: 10px;
    padding: 2px 10px;
    border-radius: 10px;
    background: #1a2a3a;
    color: var(--cyan);
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .session-badge .pulse {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--green);
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  #sync-status {
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    flex: 1;
    text-align: center;
  }
  .stat .num { font-size: 28px; font-weight: 700; }
  .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .stat.open .num { color: var(--accent); }
  .stat.urgent .num { color: var(--red); }
  .stat.done .num { color: var(--green); }

  .add-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .add-bar input[type="text"] {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-bar input:focus { border-color: var(--accent); }
  .add-bar select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .add-bar button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .add-bar button:hover { opacity: 0.85; }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr 1fr;
    gap: 16px;
    align-items: start;
  }
  .column {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    min-height: 200px;
  }
  .column h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .column h2 .dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .col-urgent .dot { background: var(--red); }
  .col-open .dot { background: var(--accent); }
  .col-waiting .dot { background: var(--orange); }
  .col-someday .dot { background: var(--purple); }
  .col-done .dot { background: var(--green); }
  .column h2 .count {
    margin-left: auto;
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
  }

  .task {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    transition: all 0.2s;
    cursor: default;
  }
  .task:hover { border-color: #3a3d4a; }
  .task.completed .task-text { text-decoration: line-through; color: var(--muted); }
  .task-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .task-text { font-size: 14px; line-height: 1.4; flex: 1; }
  .task-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .task:hover .task-actions { opacity: 1; }
  .task-actions button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 14px;
    transition: all 0.15s;
  }
  .task-actions button:hover { background: var(--border); color: var(--text); }
  .task-actions .btn-done:hover { color: var(--green); }
  .task-actions .btn-urgent:hover { color: var(--red); }
  .task-actions .btn-delete:hover { color: var(--red); }
  .task-meta {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-sales { background: #1e3a5f; color: #60a5fa; }
  .tag-ops { background: #3b2f1a; color: var(--orange); }
  .tag-finance { background: #1a3a2a; color: var(--green); }
  .tag-hr { background: #3a1a3a; color: var(--purple); }
  .tag-ai { background: #2a2a1a; color: var(--yellow); }
  .tag-mx { background: #3a1a1a; color: var(--red); }
  .tag-general { background: #2a2d3a; color: var(--muted); }
  .tag-claude { background: #1a2a3a; color: var(--cyan); }
  .tag-date {
    font-size: 10px;
    color: var(--muted);
    padding: 2px 0;
  }

  .empty {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 30px 0;
    font-style: italic;
  }
  .toast-wrap {
    position: fixed;
    right: 24px;
    bottom: 24px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 9999;
    pointer-events: none;
  }
  .toast {
    min-width: 240px;
    max-width: 320px;
    padding: 12px 14px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(26, 29, 39, 0.96);
    color: var(--text);
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    font-size: 13px;
    line-height: 1.4;
    transform: translateY(10px);
    opacity: 0;
    animation: toast-in 0.18s ease-out forwards;
  }
  .toast.success { border-color: rgba(74, 222, 128, 0.35); }
  .toast.error { border-color: rgba(248, 113, 113, 0.35); }
  .toast.info { border-color: rgba(96, 213, 250, 0.35); }
  @keyframes toast-in {
    to { transform: translateY(0); opacity: 1; }
  }

  @media (max-width: 900px) {
    .columns { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1><span>JetEx</span> Task Board</h1>
    <nav class="top-nav">
      <a class="active" href="./index.html">Task Board</a>
      <a href="./plan.html">30/60/90 Plan</a>
      <a href="./api-endpoints.html">API Endpoints</a>
    </nav>
  </div>
  <div class="header-right">
    <div id="clock"></div>
    <div id="sessions-bar"></div>
    <div id="sync-status"></div>
  </div>
</header>

<div class="stats">
  <div class="stat urgent"><div class="num" id="stat-urgent">0</div><div class="label">Urgent</div></div>
  <div class="stat open"><div class="num" id="stat-open">0</div><div class="label">Open</div></div>
  <div class="stat done"><div class="num" id="stat-done">0</div><div class="label">Done Today</div></div>
</div>

<div class="add-bar">
  <input type="text" id="taskInput" placeholder="Add a task..." autofocus>
  <select id="categorySelect">
    <option value="general">General</option>
    <option value="sales">Sales</option>
    <option value="ops">Ops</option>
    <option value="finance">Finance</option>
    <option value="hr">HR</option>
    <option value="ai">AI/Tech</option>
    <option value="mx">Maintenance</option>
  </select>
  <select id="prioritySelect">
    <option value="open">Normal</option>
    <option value="urgent">Urgent</option>
    <option value="waiting">Waiting</option>
    <option value="someday">Someday</option>
  </select>
  <button onclick="addTask()">Add</button>
</div>

<div class="columns">
  <div class="column col-urgent">
    <h2><span class="dot"></span>Urgent<span class="count" id="count-urgent">0</span></h2>
    <div id="list-urgent"></div>
  </div>
  <div class="column col-open">
    <h2><span class="dot"></span>Open<span class="count" id="count-open">0</span></h2>
    <div id="list-open"></div>
  </div>
  <div class="column col-waiting">
    <h2><span class="dot"></span>Waiting<span class="count" id="count-waiting">0</span></h2>
    <div id="list-waiting"></div>
  </div>
  <div class="column col-someday">
    <h2><span class="dot"></span>Someday<span class="count" id="count-someday">0</span></h2>
    <div id="list-someday"></div>
  </div>
  <div class="column col-done">
    <h2><span class="dot"></span>Done<span class="count" id="count-done">0</span></h2>
    <div id="list-done"></div>
  </div>
</div>

<div class="toast-wrap" id="toast-wrap"></div>

<script>
// ========== CONFIG ==========
const SHEET_ID = '170TEmIyh5wEcY_oGbo6CEzLrYQds-tNcLqW_E-L2PE4';
const TASKS_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Tasks`;
const SESSIONS_CSV = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Sessions`;
// Cloud Run API for writes
const API_URL = 'https://task-board-api-733342202720.us-east1.run.app';
const POLL_INTERVAL = 5000; // 5 seconds
const STORAGE_KEY = 'jetex-tasks';

// ========== CSV PARSING ==========
function parseCSV(csv) {
  const lines = csv.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h.replace(/^"|"$/g, '').trim()] = (vals[i] || '').replace(/^"|"$/g, ''));
    return obj;
  });
}

function parseCSVLine(line) {
  const result = [];
  let current = '';
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') {
      if (inQuotes && line[i + 1] === '"') { current += '"'; i++; }
      else inQuotes = !inQuotes;
    } else if (ch === ',' && !inQuotes) {
      result.push(current); current = '';
    } else {
      current += ch;
    }
  }
  result.push(current);
  return result;
}

// ========== DATA LAYER ==========
let cachedTasks = [];

function showToast(message, kind = 'info') {
  const wrap = document.getElementById('toast-wrap');
  if (!wrap) return;
  const el = document.createElement('div');
  el.className = `toast ${kind}`;
  el.textContent = message;
  wrap.appendChild(el);
  setTimeout(() => {
    el.style.opacity = '0';
    el.style.transform = 'translateY(10px)';
    setTimeout(() => el.remove(), 180);
  }, 2400);
}

async function fetchTasksFromSheet() {
  try {
    const res = await fetch(TASKS_CSV + '&_t=' + Date.now()); // cache-bust
    if (!res.ok) throw new Error('Fetch failed');
    const csv = await res.text();
    const rows = parseCSV(csv);
    cachedTasks = rows.map(r => ({
      id: r.id || '',
      text: r.text || '',
      category: r.category || 'general',
      status: r.status || 'open',
      source: r.source || 'manual',
      session_id: r.session_id || '',
      created: r.created_at ? new Date(r.created_at).getTime() : Date.now(),
      completedAt: r.completed_at ? new Date(r.completed_at).getTime() : null,
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cachedTasks));
    updateSyncStatus('Synced');
    return cachedTasks;
  } catch (e) {
    updateSyncStatus('Offline — using cache');
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch { return []; }
  }
}

async function fetchSessions() {
  try {
    const res = await fetch(SESSIONS_CSV + '&_t=' + Date.now());
    if (!res.ok) return [];
    const csv = await res.text();
    const rows = parseCSV(csv);
    // Only show sessions active in last 30 minutes
    const cutoff = Date.now() - 30 * 60 * 1000;
    return rows.filter(r => {
      if (r.status !== 'active') return false;
      const lastSeen = new Date(r.last_seen).getTime();
      return lastSeen > cutoff;
    });
  } catch { return []; }
}

function loadTasks() {
  return cachedTasks.length ? cachedTasks : (JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'));
}

// ========== WRITE VIA CLOUD RUN API ==========
async function writeToSheet(action, data) {
  if (!API_URL) return false;
  try {
    const resp = await fetch(API_URL + '/action', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action, id: data.id || '' }),
    });
    const result = await resp.json();
    console.log('API response:', result);
    if (!result.success) {
      showToast(result.error || 'Task update failed', 'error');
      return false;
    }
    if (action === 'complete') showToast('Task marked complete', 'success');
    else if (action === 'reopen') showToast('Task reopened', 'info');
    else if (action === 'urgent') showToast('Task priority updated', 'info');
    else if (action === 'delete') showToast('Task deleted', 'success');
    setTimeout(() => poll(), 1000);
    return result.success;
  } catch(e) {
    console.error('Write failed:', e);
    showToast('Task update failed', 'error');
    return false;
  }
}

// ========== TASK ACTIONS ==========
async function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;

  const task = {
    id: Date.now().toString(),
    text,
    category: document.getElementById('categorySelect').value,
    status: document.getElementById('prioritySelect').value,
    source: 'manual',
    session_id: '',
    created: Date.now(),
    completedAt: null,
  };

  // Optimistic local update
  cachedTasks.push(task);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cachedTasks));
  input.value = '';
  render();

  // Write to sheet via API
  try {
    await fetch(API_URL + '/add', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(task),
    });
    showToast('Task added', 'success');
    setTimeout(() => poll(), 1000);
  } catch(e) {
    console.error('Add failed:', e);
    showToast('Task add failed', 'error');
  }
}

async function toggleDone(id) {
  const t = cachedTasks.find(t => String(t.id) === String(id));
  if (!t) return;
  const action = t.status === 'done' ? 'reopen' : 'complete';
  t.status = t.status === 'done' ? 'open' : 'done';
  t.completedAt = t.status === 'done' ? Date.now() : null;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cachedTasks));
  render();
  await writeToSheet(action, { id: String(id) });
}

async function toggleUrgent(id) {
  const t = cachedTasks.find(t => String(t.id) === String(id));
  if (!t) return;
  t.status = t.status === 'urgent' ? 'open' : 'urgent';
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cachedTasks));
  render();
  await writeToSheet('urgent', { id: String(id) });
}

async function deleteTask(id) {
  cachedTasks = cachedTasks.filter(t => String(t.id) !== String(id));
  localStorage.setItem(STORAGE_KEY, JSON.stringify(cachedTasks));
  render();
  await writeToSheet('delete', { id: String(id) });
}

// ========== RENDERING ==========
function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function renderTask(task) {
  const isDone = task.status === 'done';
  const eid = escHtml(String(task.id));
  return `
    <div class="task ${isDone ? 'completed' : ''}">
      <div class="task-top">
        <div class="task-text">${escHtml(task.text)}</div>
        <div class="task-actions">
          ${!isDone ? `<button class="btn-urgent" onclick="toggleUrgent('${eid}')" title="${task.status === 'urgent' ? 'Set normal' : 'Mark urgent'}">!!</button>` : ''}
          <button class="btn-done" onclick="toggleDone('${eid}')" title="${isDone ? 'Reopen' : 'Complete'}">${isDone ? '&#8634;' : '&#10003;'}</button>
          <button class="btn-delete" onclick="deleteTask('${eid}')" title="Delete">&times;</button>
        </div>
      </div>
      <div class="task-meta">
        <span class="tag tag-${task.category}">${task.category}</span>
        ${task.source === 'claude-code' ? '<span class="tag tag-claude">Claude</span>' : ''}
        <span class="tag-date">${formatDate(task.created)}</span>
      </div>
    </div>`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render() {
  const tasks = loadTasks();
  const urgent = tasks.filter(t => t.status === 'urgent');
  const open = tasks.filter(t => t.status === 'open');
  const waiting = tasks.filter(t => t.status === 'waiting');
  const someday = tasks.filter(t => t.status === 'someday');
  const today = new Date().toDateString();
  const done = tasks.filter(t => t.status === 'done');
  const doneToday = done.filter(t => t.completedAt && new Date(t.completedAt).toDateString() === today);

  document.getElementById('list-urgent').innerHTML = urgent.length ? urgent.map(renderTask).join('') : '<div class="empty">No urgent tasks</div>';
  document.getElementById('list-open').innerHTML = open.length ? open.map(renderTask).join('') : '<div class="empty">All clear</div>';
  document.getElementById('list-waiting').innerHTML = waiting.length ? waiting.map(renderTask).join('') : '<div class="empty">Nothing blocked</div>';
  document.getElementById('list-someday').innerHTML = someday.length ? someday.map(renderTask).join('') : '<div class="empty">Nothing queued</div>';
  document.getElementById('list-done').innerHTML = done.length ? done.sort((a,b) => (b.completedAt||0) - (a.completedAt||0)).map(renderTask).join('') : '<div class="empty">Nothing completed yet</div>';

  document.getElementById('stat-urgent').textContent = urgent.length;
  document.getElementById('stat-open').textContent = open.length;
  document.getElementById('stat-done').textContent = doneToday.length;
  document.getElementById('count-urgent').textContent = urgent.length;
  document.getElementById('count-open').textContent = open.length;
  document.getElementById('count-waiting').textContent = waiting.length;
  document.getElementById('count-someday').textContent = someday.length;
  document.getElementById('count-done').textContent = done.length;
}

function renderSessions(sessions) {
  const bar = document.getElementById('sessions-bar');
  if (!sessions.length) {
    bar.innerHTML = '';
    return;
  }
  bar.innerHTML = sessions.map(s =>
    `<div class="session-badge"><span class="pulse"></span>${escHtml(s.project || 'Claude')} (${s.task_count || 0} tasks)</div>`
  ).join('');
}

function updateSyncStatus(msg) {
  const el = document.getElementById('sync-status');
  if (el) el.textContent = msg;
}

function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const date = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('clock').innerHTML = `<div class="time">${time}</div>${date}`;
}

// ========== POLLING LOOP ==========
async function poll() {
  await fetchTasksFromSheet();
  const sessions = await fetchSessions();
  render();
  renderSessions(sessions);
}

document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

// Initial load from localStorage while first fetch happens
cachedTasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
render();
updateClock();

// Start polling
poll();
setInterval(poll, POLL_INTERVAL);
setInterval(updateClock, 30000);
</script>
</body>
</html>
