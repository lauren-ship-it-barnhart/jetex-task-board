<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lauren's Task Board</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e2e4ea;
    --muted: #7a7f8e;
    --accent: #6c8cff;
    --green: #4ade80;
    --yellow: #facc15;
    --red: #f87171;
    --orange: #fb923c;
    --purple: #a78bfa;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.5px;
  }
  header h1 span { color: var(--accent); }
  #clock {
    font-size: 14px;
    color: var(--muted);
    text-align: right;
    line-height: 1.5;
  }
  #clock .time { font-size: 20px; color: var(--text); font-weight: 500; }

  .stats {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 20px;
    flex: 1;
    text-align: center;
  }
  .stat .num { font-size: 28px; font-weight: 700; }
  .stat .label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  .stat.open .num { color: var(--accent); }
  .stat.urgent .num { color: var(--red); }
  .stat.done .num { color: var(--green); }

  .add-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }
  .add-bar input[type="text"] {
    flex: 1;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .add-bar input:focus { border-color: var(--accent); }
  .add-bar select {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    cursor: pointer;
  }
  .add-bar button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 10px 20px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .add-bar button:hover { opacity: 0.85; }

  .columns {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    align-items: start;
  }
  .column {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    min-height: 200px;
  }
  .column h2 {
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.2px;
    color: var(--muted);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .column h2 .dot {
    width: 8px; height: 8px; border-radius: 50%; display: inline-block;
  }
  .col-urgent .dot { background: var(--red); }
  .col-open .dot { background: var(--accent); }
  .col-done .dot { background: var(--green); }
  .column h2 .count {
    margin-left: auto;
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 12px;
    font-weight: 600;
  }

  .task {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    transition: all 0.2s;
    cursor: default;
  }
  .task:hover { border-color: #3a3d4a; }
  .task.completed .task-text { text-decoration: line-through; color: var(--muted); }
  .task-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 8px;
  }
  .task-text { font-size: 14px; line-height: 1.4; flex: 1; }
  .task-actions {
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .task:hover .task-actions { opacity: 1; }
  .task-actions button {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    padding: 2px 6px;
    border-radius: 4px;
    font-size: 14px;
    transition: all 0.15s;
  }
  .task-actions button:hover { background: var(--border); color: var(--text); }
  .task-actions .btn-done:hover { color: var(--green); }
  .task-actions .btn-urgent:hover { color: var(--red); }
  .task-actions .btn-delete:hover { color: var(--red); }
  .task-meta {
    display: flex;
    gap: 6px;
    margin-top: 8px;
    flex-wrap: wrap;
  }
  .tag {
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .tag-sales { background: #1e3a5f; color: #60a5fa; }
  .tag-ops { background: #3b2f1a; color: var(--orange); }
  .tag-finance { background: #1a3a2a; color: var(--green); }
  .tag-hr { background: #3a1a3a; color: var(--purple); }
  .tag-ai { background: #2a2a1a; color: var(--yellow); }
  .tag-mx { background: #3a1a1a; color: var(--red); }
  .tag-general { background: #2a2d3a; color: var(--muted); }
  .tag-date {
    font-size: 10px;
    color: var(--muted);
    padding: 2px 0;
  }

  .empty {
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    padding: 30px 0;
    font-style: italic;
  }

  @media (max-width: 900px) {
    .columns { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <h1><span>JetEx</span> Task Board</h1>
  <div id="clock"></div>
</header>

<div class="stats">
  <div class="stat urgent"><div class="num" id="stat-urgent">0</div><div class="label">Urgent</div></div>
  <div class="stat open"><div class="num" id="stat-open">0</div><div class="label">Open</div></div>
  <div class="stat done"><div class="num" id="stat-done">0</div><div class="label">Done Today</div></div>
</div>

<div class="add-bar">
  <input type="text" id="taskInput" placeholder="Add a task..." autofocus>
  <select id="categorySelect">
    <option value="general">General</option>
    <option value="sales">Sales</option>
    <option value="ops">Ops</option>
    <option value="finance">Finance</option>
    <option value="hr">HR</option>
    <option value="ai">AI/Tech</option>
    <option value="mx">Maintenance</option>
  </select>
  <select id="prioritySelect">
    <option value="open">Normal</option>
    <option value="urgent">Urgent</option>
  </select>
  <button onclick="addTask()">Add</button>
</div>

<div class="columns">
  <div class="column col-urgent">
    <h2><span class="dot"></span>Urgent<span class="count" id="count-urgent">0</span></h2>
    <div id="list-urgent"></div>
  </div>
  <div class="column col-open">
    <h2><span class="dot"></span>Open<span class="count" id="count-open">0</span></h2>
    <div id="list-open"></div>
  </div>
  <div class="column col-done">
    <h2><span class="dot"></span>Done<span class="count" id="count-done">0</span></h2>
    <div id="list-done"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'jetex-tasks';

function loadTasks() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveTasks(tasks) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
}

function formatDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
}

function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) return;

  const tasks = loadTasks();
  tasks.push({
    id: Date.now(),
    text,
    category: document.getElementById('categorySelect').value,
    status: document.getElementById('prioritySelect').value,
    created: Date.now(),
    completedAt: null
  });
  saveTasks(tasks);
  input.value = '';
  render();
}

function toggleDone(id) {
  const tasks = loadTasks();
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  if (t.status === 'done') {
    t.status = 'open';
    t.completedAt = null;
  } else {
    t.status = 'done';
    t.completedAt = Date.now();
  }
  saveTasks(tasks);
  render();
}

function toggleUrgent(id) {
  const tasks = loadTasks();
  const t = tasks.find(t => t.id === id);
  if (!t) return;
  t.status = t.status === 'urgent' ? 'open' : 'urgent';
  saveTasks(tasks);
  render();
}

function deleteTask(id) {
  const tasks = loadTasks().filter(t => t.id !== id);
  saveTasks(tasks);
  render();
}

function renderTask(task) {
  const isDone = task.status === 'done';
  return `
    <div class="task ${isDone ? 'completed' : ''}">
      <div class="task-top">
        <div class="task-text">${escHtml(task.text)}</div>
        <div class="task-actions">
          ${!isDone ? `<button class="btn-urgent" onclick="toggleUrgent(${task.id})" title="${task.status === 'urgent' ? 'Set normal' : 'Mark urgent'}">!!</button>` : ''}
          <button class="btn-done" onclick="toggleDone(${task.id})" title="${isDone ? 'Reopen' : 'Complete'}">${isDone ? '&#8634;' : '&#10003;'}</button>
          <button class="btn-delete" onclick="deleteTask(${task.id})" title="Delete">&times;</button>
        </div>
      </div>
      <div class="task-meta">
        <span class="tag tag-${task.category}">${task.category}</span>
        <span class="tag-date">${formatDate(task.created)}</span>
      </div>
    </div>`;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function render() {
  const tasks = loadTasks();
  const urgent = tasks.filter(t => t.status === 'urgent');
  const open = tasks.filter(t => t.status === 'open');
  const today = new Date().toDateString();
  const done = tasks.filter(t => t.status === 'done');
  const doneToday = done.filter(t => t.completedAt && new Date(t.completedAt).toDateString() === today);

  document.getElementById('list-urgent').innerHTML = urgent.length ? urgent.map(renderTask).join('') : '<div class="empty">No urgent tasks</div>';
  document.getElementById('list-open').innerHTML = open.length ? open.map(renderTask).join('') : '<div class="empty">All clear</div>';
  document.getElementById('list-done').innerHTML = done.length ? done.sort((a,b) => b.completedAt - a.completedAt).map(renderTask).join('') : '<div class="empty">Nothing completed yet</div>';

  document.getElementById('stat-urgent').textContent = urgent.length;
  document.getElementById('stat-open').textContent = open.length;
  document.getElementById('stat-done').textContent = doneToday.length;
  document.getElementById('count-urgent').textContent = urgent.length;
  document.getElementById('count-open').textContent = open.length;
  document.getElementById('count-done').textContent = done.length;
}

function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  const date = now.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  document.getElementById('clock').innerHTML = `<div class="time">${time}</div>${date}`;
}

document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

// Auto-clear completed tasks older than 3 days
function cleanOldDone() {
  const tasks = loadTasks();
  const cutoff = Date.now() - (3 * 24 * 60 * 60 * 1000);
  const filtered = tasks.filter(t => t.status !== 'done' || (t.completedAt && t.completedAt > cutoff));
  if (filtered.length !== tasks.length) saveTasks(filtered);
}

// Seed default tasks on first visit (no localStorage yet)
const DEFAULT_TASKS = [
  // URGENT
  { id: 1, text: "Review resumes: Kelly Hayes, Robin Jones, Janessa Baldina", category: "hr", status: "urgent", created: 1742601600000, completedAt: null },
  { id: 2, text: "Schedule final interviews for top HR candidates", category: "hr", status: "urgent", created: 1742601600000, completedAt: null },
  { id: 3, text: "Build McQueen's HR/Recruiting bot (EVP of MX search)", category: "ai", status: "urgent", created: 1742601600000, completedAt: null },
  { id: 4, text: "Rename Charlie → WILCO across all UI, branding, deployment", category: "ai", status: "urgent", created: 1742601600000, completedAt: null },
  { id: 5, text: "Add JWT auth to WILCO before sharing with MX team", category: "ai", status: "urgent", created: 1742601600000, completedAt: null },
  { id: 6, text: "Announce AI Tools Registry at L10 (week of 3/24)", category: "ai", status: "urgent", created: 1742601600000, completedAt: null },
  // SALES
  { id: 10, text: "Test pricing calculator with sample routes (Zach + Aaron)", category: "sales", status: "open", created: 1742601600000, completedAt: null },
  { id: 11, text: "Test HubSpot post-trip survey automation trigger flow", category: "sales", status: "open", created: 1742601600000, completedAt: null },
  // OPS
  { id: 20, text: "Coordinate office move timeline and IT setup", category: "ops", status: "open", created: 1742601600000, completedAt: null },
  { id: 21, text: "Finalize crew scheduling bid system rules with Andy", category: "ops", status: "open", created: 1742601600000, completedAt: null },
  // FINANCE
  { id: 30, text: "Compare Q4 AR reports: Jet Insight vs Intacct", category: "finance", status: "open", created: 1742601600000, completedAt: null },
  { id: 31, text: "Confirm Q2 EOS rocks with leadership team", category: "finance", status: "open", created: 1742601600000, completedAt: null },
  // MX
  { id: 40, text: "Track N808GG upper cap repair ($225K estimate)", category: "mx", status: "open", created: 1742601600000, completedAt: null },
  { id: 41, text: "Follow up on N399LF seat repair in Santa Fe", category: "mx", status: "open", created: 1742601600000, completedAt: null },
  { id: 42, text: "Upload 7 BellAir training videos to WILCO (replace placeholders)", category: "mx", status: "open", created: 1742601600000, completedAt: null },
  { id: 43, text: "Ingest remaining ~70 PDFs from HyperCard into WILCO", category: "mx", status: "open", created: 1742601600000, completedAt: null },
  // AI/TECH
  { id: 50, text: "Build OpenAI Realtime API voice mode for WILCO (hands-free)", category: "ai", status: "open", created: 1742601600000, completedAt: null },
  { id: 51, text: "Implement hybrid search + reranking in WILCO", category: "ai", status: "open", created: 1742601600000, completedAt: null },
  { id: 52, text: "Begin backend data pipeline for Dashboard 1", category: "ai", status: "open", created: 1742601600000, completedAt: null },
  { id: 53, text: "Build session-status skill for Claude Code", category: "ai", status: "open", created: 1742601600000, completedAt: null },
  { id: 54, text: "Evaluate Ninety.io + Zapier connector for scorecard sync", category: "ai", status: "open", created: 1742601600000, completedAt: null },
  // AI TOOLS REGISTRY
  { id: 60, text: "Lock AI Tools Registry competition mechanic & window", category: "ai", status: "open", created: 1742601600000, completedAt: null },
  { id: 61, text: "Create tools-registry repo in JetExcellence GitHub org", category: "ai", status: "open", created: 1742601600000, completedAt: null },
  { id: 62, text: "Draft README template for AI tools submissions", category: "ai", status: "open", created: 1742601600000, completedAt: null },
  // INTRANET / HR
  { id: 70, text: "Evaluate intranet platform: Next.js vs Notion vs custom", category: "ai", status: "open", created: 1742601600000, completedAt: null },
  { id: 80, text: "Confirm LinkedIn Recruiter subscription tier for Fabiana", category: "hr", status: "open", created: 1742601600000, completedAt: null },

if (!localStorage.getItem(STORAGE_KEY)) {
  saveTasks(DEFAULT_TASKS);
}

cleanOldDone();
render();
updateClock();
setInterval(updateClock, 30000);
</script>
</body>
</html>
